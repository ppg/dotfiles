version: 2
issues:
  # no max on issues
  max-issues-per-linter: 0
  max-same-issues: 0
formatters:
  enable:
    - gofumpt
    - goimports
linters:
  default: none
  enable:
    - govet
    - revive  # golint replacement

  settings:
    govet:
      enable-all: true
      disable:
        - fieldalignment
      settings:
        shadow:
          # Optional: Set to true for more aggressive detection
          strict: true
    revive:
      enable-default-rules: true
      severity: warning
      confidence: 0.8
      #rules:
      #  - name: dot-imports
      #    arguments:
      #      - allowedPackages:
      #          # Allow dot imports for ginkgo and gomega patterns
      #          - "github.com/onsi/ginkgo/v2"
      #          - "github.com/onsi/gomega"
      #          - "github.com/onsi/gomega/gstruct"
      #          - "github.com/TheJumpCloud/jumpcloud-common-go/v5/testhelpers/gomega/log"
      #          - "github.com/TheJumpCloud/jumpcloud-directory/test/helpers"
      #          - "github.com/TheJumpCloud/jumpcloud-directory/test/helpers/ginkgo"
      #  - name: exported
      #    exclude:
      #      - '*_test\.go$'
      #      - 'test/helpers/.*\.go$'
      #      - test/helpers/redis_server.go
run:
  build-tags:
    - benchmark
    - functional
    - functional_benchmark
    - integration
